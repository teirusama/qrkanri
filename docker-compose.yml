version: '3.8'

services:
  db:
    image: mysql:8
    container_name: vivawork-db
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: qrkanri
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3307:3306"

  app:
    build: .
    container_name: vivawork-app
    ports:
      - "8080:8080"
    depends_on:
      - db
    restart: always
    env_file:
      - .env