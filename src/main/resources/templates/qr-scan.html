<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <title>VIVAWORK</title>

    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

    <script src="https://unpkg.com/html5-qrcode"></script>

    <style>

        body{
        margin:0;
        min-height:100vh;
        text-align:center;
        font-family:'DotGothic16', sans-serif;
        background:#d8d8d8;
        display:flex;
        justify-content:center;
        align-items:center;
        }

        h2{
        margin-top:40px;
        }

        #reader{
            width:270px;
            height:360px;
            margin:20px auto 30px;
            border-radius:20px;
            overflow:hidden;
            border:4px solid #5b9bd5;
            box-shadow:
                0 0 10px #5b9bd5,
                0 0 20px #5b9bd5,
                0 0 30px rgba(91,155,213,0.6);
            animation:glowPulse 2s infinite;
        }

        @keyframes glowPulse{
            0%{box-shadow:0 0 5px #5b9bd5,0 0 10px #5b9bd5;}
            50%{box-shadow:0 0 15px #5b9bd5,0 0 30px #5b9bd5,0 0 45px rgba(91,155,213,0.8);}
            100%{box-shadow:0 0 5px #5b9bd5,0 0 10px #5b9bd5;}
        }

        .msg{
        margin-top:2px;
        margin-bottom:10px;
        font-size:16px;
        color:black;
        text-align:center;
        display:inline-block;
        }

        .modal{
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background:rgba(0,0,0,0.3);
        display:none;
        justify-content:center;
        align-items:center;
        font-family:'DotGothic16', sans-serif;
        z-index:2000;
        }

        .modal-content{
        background:white;
        padding:20px;
        border:3px solid #333;
        border-radius:10px;
        width:260px;
        text-align:center;
        }

        .modal-actions{
        margin-top:15px;
        display:flex;
        justify-content:center;
        gap:10px;
        }

        .modal-actions button{
        background:black;
        color:white;
        padding:6px 12px;
        border:none;
        border-radius:6px;
        cursor:pointer;
        font-family:'DotGothic16', sans-serif;
        }

        .primary-btn{background:black;color:white;}
        .gray-btn{background:black;color:white;}


        .weather-box{
            position:relative;
            margin-top:12px;
            padding:12px;
            border:2px solid #333;
            border-radius:8px;
            background-size:cover;
            background-position:center;
            background-blend-mode:lighten;
        }

        .weather-title{
            font-size:12px;
            margin-bottom:5px;
            color:black;
        }

        .weather-content{
            font-size:14px;
            color:black;
            margin-bottom:4px;
        }

        .weather-message{
            font-size:12px;
            color:black;
        }

        .body-wrapper{
            width:80%;
            max-width:420px;
            margin:40px auto;
            background:white;
            border:5px solid #333;
            border-radius:20px;
            box-shadow:7px 7px 0 #9e9e9e;
            padding:20px 0 30px;
            position:relative;
        }

        .back-btn{
            display:block;
            width:100px;
            margin:3px auto;
            padding:7px;
            font-size:16px;
            background:#337fc6;
            color:white;
            text-decoration:none;
            cursor:pointer;
            font-family:'DotGothic16', sans-serif;
            border:3px solid #333;
            border-radius:8px;
        }

    </style>

</head>

<body>

<div class="body-wrapper">
    <div class="msg-row">
        <div class="msg">QRコードを読み取ってください。</div>
    </div>

    <div id="reader"></div>

    <button class="back-btn" onclick="history.back()">戻る</button>

</div>

<div id="messageModal" class="modal">
    <div class="modal-content">
        <p id="messageText"></p>
        <div class="modal-actions">
            <button class="primary-btn" onclick="closeMessageModal()">閉じる</button>
        </div>
    </div>
</div>

<div id="confirmModal" class="modal">
    <div class="modal-content">
        <p>まだ退勤時間ではありません。<br>本当に退勤しますか？</p>
        <div class="modal-actions">
            <button class="primary-btn" onclick="confirmCheckout()">はい</button>
            <button class="gray-btn" onclick="closeConfirmModal()">いいえ</button>
        </div>
    </div>
</div>

<script>

    const html5QrCode = new Html5Qrcode("reader");

    let scanning = false;
    let pendingToken = null;

    async function getTomorrowWeather() {

        const locationRes = await fetch("https://ipapi.co/json/");
        const locationData = await locationRes.json();

        const lat = locationData.latitude;
        const lon = locationData.longitude;

        const weatherRes = await fetch(
            `https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&daily=weathercode,temperature_2m_max,temperature_2m_min&timezone=auto`
        );

        const data = await weatherRes.json();

        const code = data.daily.weathercode[1];
        const max = data.daily.temperature_2m_max[1];
        const min = data.daily.temperature_2m_min[1];

        const avg = Math.round((max + min) / 2);

        let weatherText = "알 수 없음";
        let bg = "/images/weather/sun.png";
        let message = " ";

        if(code <= 2){
            weatherText = "晴れ";
            bg = "/images/weather/sun.png";
            message = "気持ち良い日になりそうですね。";
        }
        else if(code === 3){
            weatherText = "曇り";
            bg = "/images/weather/cloud.png";
            message = "少し曇りそうです。";
        }
        else if(code >= 45 && code <= 48){
            weatherText = "霧";
            bg = "/images/weather/fog.png";
            message = "運転時はご注意を";
        }
        else if((code >= 51 && code <= 67) || (code >= 80 && code <= 82)){
            weatherText = "雨";
            bg = "/images/weather/rain.png";
            message = "傘を忘れずに";
        }
        else if((code >= 71 && code <= 77) || (code >= 85 && code <= 86)){
            weatherText = "雪";
            bg = "/images/weather/snow.png";
            message = "足元に気をつけてください。";
        }

        return `
            <div class="weather-box"
                style="background-image:
                    linear-gradient(rgba(255,255,255,0.4), rgba(255,255,255,0.4)),
                    url('${bg}')">

                <div class="weather-title">明日の天気</div>

                <div class="weather-content">
                    ${weatherText} / ${avg}℃
                </div>

                <div class="weather-message">
                    ${message}
                </div>
            </div>
        `;
    }

    function vibrate(){
        if(navigator.vibrate){
            navigator.vibrate(200);
        }
    }

    function showMessage(text){
        document.getElementById("messageText").innerHTML = text;
        document.getElementById("messageModal").style.display = "flex";
    }

    function closeMessageModal(){
        document.getElementById("messageModal").style.display = "none";
        window.location.href="/home";
    }

    function openConfirmModal(){
        document.getElementById("confirmModal").style.display = "flex";
    }

    function closeConfirmModal(){
        document.getElementById("confirmModal").style.display = "none";
        pendingToken = null;
        scanning = false;
    }

    async function confirmCheckout(){

        fetch(`/qr/checkin?token=${pendingToken}&force=true`)
        .then(res => res.json())
        .then(async data => {

            document.getElementById("confirmModal").style.display = "none";
            pendingToken = null;

            if(data.result === "CHECKOUT"){
                vibrate();

                const weather = await getTomorrowWeather();

                showMessage("お疲れ様でした！" + weather);
                return;
            }

            showMessage("退勤処理に失敗しました。");
            scanning = false;

        })
        .catch(err => {
            console.error(err);

            document.getElementById("confirmModal").style.display = "none";
            pendingToken = null;

            showMessage("通信エラー");
            scanning = false;
        });

    }

    function onScanSuccess(decodedText){

        if(scanning) return;
        scanning = true;

        console.log("QR:", decodedText);

        if(!decodedText.includes("token=")){
            showMessage("このQRコードは打刻用ではありません。");
            scanning = false;
            return;
        }

        const url = new URL(decodedText, window.location.origin);
        const token = url.searchParams.get("token");

        fetch(`/qr/checkin?token=${token}`)
        .then(res => res.json())
        .then(async data => {

            console.log("response:", data);

            if(!data || !data.result){
                showMessage("打刻処理に失敗しました。");
                scanning = false;
                return;
            }

            if(data.result === "CHECKIN"){
                vibrate();
                showMessage("おはようございます！");
                return;
            }

            if(data.result === "CHECKOUT"){
                vibrate();

                const weather = await getTomorrowWeather();

                showMessage("お疲れ様でした！" + weather);
                return;
            }

            if(data.result === "EARLY_WARNING"){
                pendingToken = token;
                openConfirmModal();
                return;
            }

            showMessage("不明な応答");
            scanning = false;

        })
        .catch(err => {
            console.error(err);
            showMessage("通信エラー");
            scanning = false;
        });
    }

    Html5Qrcode.getCameras().then(devices => {

        if (devices && devices.length) {

            const backCamera = devices.find(d =>
                d.label.toLowerCase().includes("back") ||
                d.label.toLowerCase().includes("rear")
            );

            const cameraId = backCamera ? backCamera.id : devices[0].id;

            html5QrCode.start(
                cameraId,
                {
                    fps: 10,
                    qrbox: 250
                },
                onScanSuccess
            );
        }

    }).catch(err => {
        console.error(err);
        showMessage("カメラ起動失敗");
    });

</script>

</body>
</html>
