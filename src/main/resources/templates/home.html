<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VIVAWORK-ホーム</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

    <style>

        body{
            margin:0;
            min-height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            font-family: 'DotGothic16', sans-serif;
            background:#d8d8d8;
            text-align:center;
            overflow-x: hidden;
        }

        .menu-btn{
            position:absolute;
            top:5px;
            right:15px;
            font-size:28px;
            cursor:pointer;
        }

        .status{
            font-size:70px;
            margin-top:5px;
            color:#5b9bd5;
        }

        .status-on{
            color:#ff8c42;
            animation: glowPulse 2s ease-in-out infinite;
            will-change: text-shadow;
            transform: translateZ(0);
        }

        @keyframes glowPulse {
            0%{
                text-shadow:
                    0 0 6px rgba(255,140,66,0.4),
                    0 0 12px rgba(255,140,66,0.3),
                    0 0 18px rgba(255,140,66,0.2);
            }
            50%{
                text-shadow:
                    0 0 12px rgba(255,140,66,0.8),
                    0 0 24px rgba(255,140,66,0.6),
                    0 0 36px rgba(255,140,66,0.4);
            }
            100%{
                text-shadow:
                    0 0 6px rgba(255,140,66,0.4),
                    0 0 12px rgba(255,140,66,0.3),
                    0 0 18px rgba(255,140,66,0.2);
            }
        }

        .message{
            margin-bottom: 30px;
            font-size:16px;
        }

        .btn{
            display:block;
            width:120px;
            margin:15px auto;
            padding:8px;
            font-size:18px;
            background:#337fc6;
            color:white;
            border-radius:10px;
            text-decoration:none;

            border:3px solid #333;
            border-radius:8px;
        }

        .btn:hover{
            background:#4a95db;
        }

        .menu-modal{
            position:fixed;
            top:0;
            left:0;
            width:100%;
            height:100%;
            background:rgba(0,0,0,0.4);

            display:none;
            justify-content:center;
            align-items:center;

            z-index:1000;
        }

        .menu-modal.open{
            display:flex;
        }

        .menu-modal-content{
            position:relative;
            width:220px;
            max-height:75vh;
            overflow-y:auto;
            padding:25px 20px 20px;
            border-radius:15px;
            border:4px solid #333;

            background:white;
        }

        .close-btn-top{
            position:absolute;
            top:10px;
            right:12px;

            font-size:18px;
            font-weight:bold;

            cursor:pointer;
        }

        .toast{
            position:fixed;
            bottom:40px;
            left:50%;
            transform:translateX(-50%);
            background:#333;
            color:white;
            padding:14px 24px;
            border-radius:8px;
            font-size:16px;
            opacity:0;
            transition:opacity 0.4s;
            z-index:2000;
        }

        .toast.show{
            opacity:1;
        }

        .on-mode .btn{
            background:#fc6b11;
        }

        .on-mode .btn:hover{
            background:#ff8533;
        }

        .status-image img{
            width:140px;
            height:auto;
        }

        .drawer-menu{
            margin-bottom:30px;
            text-align:center;
        }
        .menu-section{
            margin-bottom:8px;
        }

        .menu-title{
            width:120px;
            margin:0 auto;
            font-weight:bold;
            font-size:14px;
            padding:8px;
            border:3px solid black;
            border-radius:8px;
            cursor:pointer;
            background:black;
            color:white;
        }
        .body-wrapper{
            width:80%;
            max-width:420px;
            background:white;
            border:5px solid #333;
            border-radius:20px;
            box-shadow:7px 7px 0 #9e9e9e;
            padding:30px 0;

            margin:0;
            position: relative;
        }

    </style>

</head>

<body th:classappend="${status == 'ON'} ? ' on-mode' : ''">
<div class="body-wrapper">

<div class="menu-btn"
     th:if="${employee.role == 'ADMIN'}"
     onclick="openDrawer()">
    ☰
</div>

<div class="status"
     th:classappend="${status == 'ON'} ? ' status-on' : ''"
     th:text="${status}">
</div>

<div class="status-image">

    <img th:if="${status == 'ON'}"
         th:src="@{/images/statuson.png}"
         alt="ON 상태">

    <img th:if="${status == 'OFF'}"
         th:src="@{/images/statusoff.png}"
         alt="OFF 상태">

</div>

<div class="message">

    <p th:if="${status == 'OFF'}"
       th:utext="|${employee.name}様、こんにちは！<br />ただいま勤務中ではありません。|">
    </p>

    <p th:if="${status == 'ON'}"
       th:utext="|${employee.name}様、こんにちは！<br />現在勤務中です。|">
    </p>

</div>

<a href="/qr-scan" class="btn">QR打刻</a>
<a th:href="@{/my-schedule}" class="btn">私のシフト</a>
<a href="/logout" class="btn">ログアウト</a>

<div id="drawer" class="menu-modal">
    <div class="menu-modal-content">

        <span class="close-btn-top" onclick="closeDrawer()">✕</span>

        <div class="drawer-menu">
            <h3>管理者メニュー</h3>

            <div class="menu-section">
                <div class="menu-title" onclick="location.href='/admin/dashboard'">
                    ダッシュボード
                </div>
            </div>
            <div class="menu-section">
                <div class="menu-title" onclick="location.href='/admin/shift-manage'">
                    シフト管理
                </div>
            </div>
            <div class="menu-section">
                <div class="menu-title" onclick="location.href='/admin/employee-list'">
                    社員ID管理
                </div>
            </div>
            <div class="menu-section">
                <div class="menu-title" onclick="location.href='/admin/employee-new'">
                    新規ID登録
                </div>
            </div>
        </div>

    </div>
</div>
</div>
<div id="toast" class="toast"></div>

<script>

    function openDrawer(){
        document.getElementById("drawer").classList.add("open");
    }

    function closeDrawer(){
        document.getElementById("drawer").classList.remove("open");
    }

    const params = new URLSearchParams(window.location.search);
    const msg = params.get("msg");

    if(msg){

        const toast = document.getElementById("toast");

        if(msg === "employee_created"){
            toast.innerText = "IDが登録されました。";
        }

        if(msg === "logout"){
            toast.innerText = "ログアウトしました。";
        }

        toast.classList.add("show");

        setTimeout(()=>{
            toast.classList.remove("show");
        },3000);
    }

</script>

</body>
</html>
