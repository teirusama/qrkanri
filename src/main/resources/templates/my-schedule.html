<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>VIVAWORK-私のシフト</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

    <style>
        body {
            margin: 0;
            font-family: 'DotGothic16', sans-serif;
            background: #f5f5f5;
        }

        .container {
            padding: 20px;
            max-width: 500px;
            margin: auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;

        }

        .month-nav {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        button {
            appearance: none;
            -webkit-appearance: none;
            background: transparent;
            border: none;
            color: black;
            font-family: 'DotGothic16', sans-serif;
            font-size: 18px;
            cursor: pointer;
        }

        .calendar {
            margin-top: 20px;
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            gap: 8px;
        }

        .day {
            position: relative;
            aspect-ratio: 1/1;
            background: white;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 500;
            box-shadow: 0 2px 6px rgba(0,0,0,0.05);
        }
        .day.selected{
            border:2px solid black;
        }

        .today {
            background: #e5e5e5;
        }

        .dot {
            position: absolute;
            top:6px;
            right:6px;
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }

        .completed-dot {
            background: #337fc6;
        }

        .scheduled-dot {
            background: #ff8533;
        }

        .week-header {
            display: grid;
            grid-template-columns: repeat(7, 1fr);
            margin-top: 15px;
            font-size: 12px;
            text-align: center;
            color: #999;
        }

        .bottom-sheet {
            position: fixed;
            left: 50%;
            transform: translateX(-50%);
            bottom: -100%;
            width: 100%;
            max-width: 500px;
            height: 240px;
            background: white;
            border-radius: 20px 20px 0 0;
            box-shadow: 0 -4px 16px rgba(0,0,0,0.12);
            padding: 20px;
            transition: bottom 0.25s ease;
            box-sizing: border-box;
        }

        .bottom-sheet.show {
            bottom: 0;
        }

        .sheet-header {
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
            margin-bottom: 20px;
            font-weight: 600;
            font-size: 20px;
        }

        .close-btn {
            position: absolute;
            right: 0;
            top: 0;
            font-size: 20px;
            background: none;
            border: none;
            cursor: pointer;
        }

        .sheet-content {
            text-align: center;
            font-size: 18px;
            line-height: 1.5;
        }
        .calendar-image{
            position: fixed;
            bottom: 40px;
            left: 50%;
            transform: translateX(-50%);
        }
        .calendar-image img{
            width:300px;
            height:auto;
            opacity:0.9;
        }

    </style>
</head>
<body>

<div class="container">

    <div class="header">
        <div style="display:flex; align-items:center; gap:5px;">
            <button onclick="goHome()">«</button>
            <h3 style="margin:0;">私のシフト</h3>
        </div>
        <div class="month-nav">
            <button onclick="changeMonth(-1)">‹</button>
            <span id="monthLabel"></span>
            <button onclick="changeMonth(1)">›</button>
        </div>
    </div>

    <div class="week-header">
        <div>日</div><div>月</div><div>火</div><div>水</div>
        <div>木</div><div>金</div><div>土</div>
    </div>

    <div id="calendar" class="calendar"></div>

    <div class="calendar-image">
        <img th:src="@{/images/etc2.png}" alt="비버 캐릭터">
    </div>

</div>

<div id="bottomSheet" class="bottom-sheet">
    <div class="sheet-header">
        <span id="sheetDate"></span>
        <button class="close-btn" onclick="closeSheet()">×</button>
    </div>
    <div id="sheetInfo" class="sheet-content"></div>
</div>

<script>
    const base = new Date();
    let current = new Date();

    function isAllowedMonth(date) {
        const diff =
            (date.getFullYear() - base.getFullYear()) * 12 +
            (date.getMonth() - base.getMonth());
        return diff >= -1 && diff <= 1;
    }
    function goHome() {
        window.location.href = "/home";
    }

    function loadCalendar() {

        const year = current.getFullYear();
        const month = current.getMonth() + 1;

        document.getElementById("monthLabel").innerText =
            year + "年 " + month + "月";

        fetch(`/admin/shifts/calendar?year=${year}&month=${month}`)
            .then(res => res.json())
            .then(data => {

                const calendar = document.getElementById("calendar");
                calendar.innerHTML = "";

                const firstDay = new Date(year, month - 1, 1).getDay();

                for (let i = 0; i < firstDay; i++) {
                    calendar.appendChild(document.createElement("div"));
                }

                const today = new Date();

                data.forEach(day => {

                    const div = document.createElement("div");
                    div.classList.add("day");

                    const dateObj = new Date(day.date);
                    div.innerText = dateObj.getDate();

                    if (
                        today.getFullYear() === dateObj.getFullYear() &&
                        today.getMonth() === dateObj.getMonth() &&
                        today.getDate() === dateObj.getDate()
                    ) {
                        div.classList.add("today");
                    }

                    if (day.status === "COMPLETED") {
                        const dot = document.createElement("div");
                        dot.classList.add("dot", "completed-dot");
                        div.appendChild(dot);
                    }

                    if (day.status === "SCHEDULED") {
                        const dot = document.createElement("div");
                        dot.classList.add("dot", "scheduled-dot");
                        div.appendChild(dot);
                    }

                    div.onclick = () => {


                        document.querySelectorAll(".day").forEach(d => d.classList.remove("selected"));


                        div.classList.add("selected");

                        openSheet(day.date);
                    };

                    calendar.appendChild(div);
                });
            });
    }

    function changeMonth(diff) {
        const temp = new Date(current);
        temp.setMonth(temp.getMonth() + diff);
        if (!isAllowedMonth(temp)) return;
        current = temp;
        loadCalendar();
    }
    function formatTime(dateTimeString) {
        if (!dateTimeString) return "-";

        const date = new Date(dateTimeString);
        const hours = String(date.getHours()).padStart(2, '0');
        const minutes = String(date.getMinutes()).padStart(2, '0');

        return `${hours}:${minutes}`;
    }
    function formatDatePretty(dateString) {

        const date = new Date(dateString);

        const year = date.getFullYear();
        const month = date.getMonth() + 1;
        const day = date.getDate();

        const weekDays = ["日", "月", "火", "水", "木", "金", "土"];
        const weekDay = weekDays[date.getDay()];

        return `${year}年${month}月${day}日(${weekDay})`;
    }

    function openSheet(date) {

        fetch(`/admin/shifts/detail?date=${date}`)
            .then(res => res.json())
            .then(data => {

                document.getElementById("sheetDate").innerText = formatDatePretty(date);

                let html = "";

                const hasCompletedAttendance =
                    data.attendance &&
                    data.attendance.checkIn &&
                    data.attendance.checkOut;

                if (hasCompletedAttendance) {


                    html += `<p>出勤打刻 ${formatTime(data.attendance.checkIn)}</p>`;
                    html += `<p>退勤打刻 ${formatTime(data.attendance.checkOut)}</p>`;

                } else if (data.shift) {


                    html += `<p>出勤予定時刻 ${data.shift.startTime.substring(0,5)}</p>`;
                    html += `<p>退勤予定時刻 ${data.shift.endTime.substring(0,5)}</p>`;

                } else {

                    html += `<p>勤務情報がありません。</p>`;
                }


                document.getElementById("sheetInfo").innerHTML = html;
                document.getElementById("bottomSheet").classList.add("show");
            });
    }

    function closeSheet() {
        document.getElementById("bottomSheet").classList.remove("show");
    }

    loadCalendar();
</script>

</body>
</html>
