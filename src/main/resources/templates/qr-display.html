<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>VIVAWORK</title>
    <meta http-equiv="refresh" content="300">
    <meta name="viewport" content="width=device-width, initial-scale=1">

    <link href="https://fonts.googleapis.com/css2?family=DotGothic16&display=swap" rel="stylesheet">

    <style>
        body{
            margin:0;
            font-family:'DotGothic16', sans-serif;
            background:#f5f5f5;

            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
        }

        .container{
            text-align:center;
            padding:20px;
            width:100%;
            max-width:500px;
        }

        h2{
            font-size:20px;
            margin-bottom:20px;
        }

        .qr-box{
            position:relative;
            background:white;
            padding:10px;
            margin-left:25px;
            margin-right:25px;
            border:5px solid #333;
            border-radius:20px;
            box-shadow:7px 7px 0 #9e9e9e;

        }
        .corner-img{
            position: absolute;
            left: -30px;
            bottom: -20px;
            width: 95px;
            pointer-events: none;
        }

        img{
            width:70vw;
            max-width:420px;
        }

        p{
            margin-top:20px;
            font-size:14px;
            color:#555;
        }


        .refresh-btn{
            margin-top:20px;
            padding:10px 30px;
            border:3px solid #333;
            border-radius:10px;
            background:#337fc6;
            color:white;
            cursor:pointer;
            font-size:16px;
            font-family:'DotGothic16', sans-serif;
            box-shadow:3px 3px 0 #ccc;
        }

        .refresh-btn:active{
            transform:translate(2px,2px);
            box-shadow:1px 1px 0 #ccc;
        }

        @media (min-width:768px){
            h2{
                font-size:24px;
            }

            p{
                font-size:16px;
            }
        }

    </style>
</head>

<body>

<div class="container">

    <h2>打刻用QRコード</h2>

    <div class="qr-box">
        <img src="/qr/image">
        <img src="/images/etc1.png" class="corner-img">
    </div>

    <p>　読み取れない場合は、更新ボタンを押してください。</p>


    <button class="refresh-btn" onclick="location.reload()">
        更新
    </button>

</div>

</body>
</html>
